version: 0.2

phases:
  install:
    commands:
      - yum install -y unzip
      - curl -LO https://releases.hashicorp.com/terraform/1.13.0/terraform_1.13.0_linux_amd64.zip
      - unzip terraform_1.13.0_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform version

  build:
    commands:
      - cd environments/dev
      - terraform init
      - terraform validate
      - terraform plan -out=tfplan

  post_build:
    commands:
      - terraform apply -auto-approve tfplan
